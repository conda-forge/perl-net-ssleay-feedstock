{% set name = "perl-net-ssleay" %}
{% set version = "1.96" %}
{% set sha256 = "ab213691685fb2a576c669cbc8d9266f8165a31563ad15b7c4030b94adfc0753" %}

package:
  name: perl-net-ssleay
  version: "{{ version }}"

source:
  url: https://cpan.metacpan.org/authors/id/C/CH/CHRISN/Net-SSLeay-{{ version }}.tar.gz
  sha256: {{ sha256 }}
  patches:
      # see: https://github.com/radiator-software/p5-net-ssleay/pull/520
    - email-and-cert-test-format-change.patch
    - cross-compile.patch

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - perl
    - perl-extutils-makemaker
    - perl-mime-base64
    - openssl
    - zlib

  run:
    - perl
    - perl-mime-base64
    - openssl
    - zlib

test:
  imports:
    - Net::SSLeay

about:
  home: https://metacpan.org/dist/Net-SSLeay
  license: Artistic-2.0
  summary: 'Perl extension for using OpenSSL'
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - dslarm
    - cbrueffer
